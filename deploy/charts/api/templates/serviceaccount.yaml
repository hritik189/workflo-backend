apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "workflo-api.labels" . | nindent 4 }}
  annotations:
    # Binds this ServiceAccount to the Azure user-assigned identity (federated in Terraform).
    azure.workload.identity/client-id: {{ .Values.serviceAccount.clientId | quote }}
