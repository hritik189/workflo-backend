# Maps Azure Key Vault secrets into the pod via the Secrets Store CSI driver, and syncs
# them into a Kubernetes Secret (secretObjects) that the Deployment consumes as env vars.
# Auth is via Workload Identity (no pod-identity, no VM managed identity).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "workflo-api.fullname" . }}-kv
  labels:
    {{- include "workflo-api.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.serviceAccount.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ .secretName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "workflo-api.fullname" . }}-secrets
      type: Opaque
      data:
        {{- range .Values.keyVault.secrets }}
        - objectName: {{ .secretName }}
          key: {{ .envName }}
        {{- end }}
